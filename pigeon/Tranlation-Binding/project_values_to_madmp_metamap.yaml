class_derivations:
  # Merge all logic into one 'DMPData' derivation block
  DMPData:
    populated_from: Project
    slot_derivations:
      # Fields from your previous 'DMPData' block
      title:
        populated_from: research_question.title
      created:
        populated_from: schedule.project_start
      modified:
        populated_from: schedule.project_end
      dataset:
        populated_from: dataset
        # range: Dataset
        # cast_collection_as: MultiValuedList

      # Fields from your previous 'Project' block
      start:
        populated_from: schedule.project_start
      end:
        populated_from: schedule.project_end
      funding:
        populated_from: partner.rdm_policy
      partner:
        populated_from: partner

  # Keep Dataset, Contact, and Partner as separate derivation blocks
  Dataset:
    populated_from: Dataset
    slot_derivations:
      title:
        populated_from: id
      description:
        populated_from: description
      personal_data:
        populated_from: sensitive_data.personal_data_yesno.yesno
      sensitive_data:
        populated_from: sensitive_data.other.yesno

  Contact:
    populated_from: Partner
    slot_derivations:
      name:
        populated_from: contact_person.name
      mbox:
        populated_from: contact_person.email

  Partner:
    populated_from: Partner
    slot_derivations:
      name:
        populated_from: name
      contact_person:
        populated_from: contact_person
      mbox:
        populated_from: contact_person.email